<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick & Win V3</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

<div class="header">

<h1>🎯 Pick & Win V3</h1>

<div class="wallet">

<span id="balance">0 ETB</span>

</div>

</div>

  <div class="game-area">

    <div class="timer">
        ⏳ <span id="timer">30</span>s
    </div>

    <div class="pick-info">
        Pick up to 5 cards
    </div>

    <div id="cardGrid" class="card-grid">
    </div>

<div id="drawBoard" class="hidden">

    <div class="drawHeader">

        <div class="info">Call <span id="callCount">0</span></div>

        <div class="info">Players <span id="playerCount">0</span></div>

        <div class="info">Stake 10</div>

    </div>

    <div class="bingoLetters">

        <span class="letter b">B</span>

        <span class="letter i">I</span>

        <span class="letter n">N</span>

        <span class="letter g">G</span>

        <span class="letter o">O</span>

    </div>

    <div id="numberBoard"></div>

</div>
    
</div>
  
<div class="info">

<div>

<p>Player</p>

<h3 id="username">Loading...</h3>

</div>

<div>

<p>Current Round</p>

<h3 id="round">#0001</h3>

</div>

</div>

<div class="timerBox">

<div id="timerCircle">

<span id="timer">30</span>

</div>

<p>Select up to 5 Cards</p>

</div>

<div id="grid" class="grid">

</div>

<div class="actions">

    <button id="confirmBtn">
        ✅ Confirm Picks
    </button>

    <button id="depositBtn">
        💰 Deposit
    </button>

    <button id="withdrawBtn">
        💸 Withdraw
    </button>

</div>

<script src="/static/app.js"></script>

</body>

</html>
