<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yegna Bingo</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="container">

    <div class="app-logo-neon-container" style="text-align: center; margin-top: 25px; margin-bottom: 20px;">
    <h1 style="font-size: 32px; font-weight: 900; color: #ffffff; margin: 0; text-shadow: 0 0 10px #2ed573, 0 0 20px #2ed573; font-family: sans-serif; letter-spacing: 1px;">
        የYegnaኛ
    </h1>
    <span style="font-size: 40px; font-weight: 900; color: #ffd700; text-transform: uppercase; display: inline-block; margin-top: -5px; text-shadow: 0 0 15px #ffcc00, 0 0 30px #ffa500; letter-spacing: 3px;">
        BINGO
    </span>
    <div style="font-size: 11px; color: #a4b0be; text-transform: uppercase; letter-spacing: 4px; margin-top: 5px;">
        • Mini App Game •
    </div>
</div>

    <div class="timer-container-circle">
        <div class="circle-timer">
            <span id="timerText">30</span>
            <small>Seconds</small>
        </div>
    </div>

    <div class="top-status-bar">
        <div class="derash-badge">Derash 10 📋</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">Game<strong>-</strong></div>
        <div class="stat-box">Bet<strong>10 ETB</strong></div>
        <div class="stat-box">Active Game<strong>-</strong></div>
        <div class="stat-box">Wallet<strong>- ETB</strong></div>
        <div class="stat-box">Gift<strong>0.00 Coin</strong></div>
    </div>

    <div class="card-grid-200" id="cardGrid">
        </div>

    <div class="pick-actions">
        <button class="btn-confirm" id="confirmBtn">CONFIRM PICKS</button>
        <button class="btn-refresh-blue" onclick="window.location.reload()">Refresh</button>
    </div>
</div>

    <div id="drawScreen" style="display: none;">
        <div class="bingo-header">
            <div class="info-group">
                <div class="info-badge purple">Call <span id="callCount">60</span></div>
                <div class="info-badge purple-light">Players <span id="playerCount">84</span></div>
                <div class="info-badge green">Stake <span id="stakeAmt">10</span></div>
                <div class="info-badge green-dark">Derash <span id="derashAmt">672</span></div>
            </div>
            <div class="game-meta">
                <span>Game 572920</span>
                <button id="soundBtn" onclick="toggleSound()">🔊</button>
                <div class="bonus-toggle">
                    <span>Bonus</span>
                    <span class="toggle-icon">●</span>
                </div>
            </div>
        </div>

        <div class="bingo-board-75">
            <div class="bingo-row"><div class="letter b">B</div><div id="b-container" class="num-row"></div></div>
            <div class="bingo-row"><div class="letter i">I</div><div id="i-container" class="num-row"></div></div>
            <div class="bingo-row"><div class="letter n">N</div><div id="n-container" class="num-row"></div></div>
            <div class="bingo-row"><div class="letter g">G</div><div id="g-container" class="num-row"></div></div>
            <div class="bingo-row"><div class="letter o">O</div><div id="o-container" class="num-row"></div></div>
        </div>

        <div class="recent-balls-row">
            <div class="recent-ball live">29</div>
            <div class="recent-ball">36</div>
            <div class="recent-ball">22</div>
            <div class="recent-ball">19</div>
        </div>

        <div class="player-card-wrapper">
            <div id="playerBingoCard" class="player-bingo-card"></div>
            <button id="bingoClaimBtn" class="btn-bingo-gold">BINGO</button>
        </div>

        <div class="small-control-row">
            <button class="btn-refresh-blue" onclick="window.location.reload()">Refresh</button>
            <button class="btn-exit-red" onclick="if(window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.close();">Exit</button>
        </div>

    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
